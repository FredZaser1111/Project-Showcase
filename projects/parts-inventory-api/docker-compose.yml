# Local PostgreSQL for parts inventory DBMS demos (port 5433 avoids Cozy inventory on 5432).
services:
  parts-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parts
      POSTGRES_PASSWORD: parts_dev
      POSTGRES_DB: parts_inventory
    ports:
      - "5433:5432"
    volumes:
      - parts_pg:/var/lib/postgresql/data
      - ./schema/parts_inventory.sql:/docker-entrypoint-initdb.d/01_parts_inventory.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parts -d parts_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parts_pg:
